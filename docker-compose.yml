version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ois-postgres
    environment:
      POSTGRES_DB: ois
      POSTGRES_USER: ois_user
      POSTGRES_PASSWORD: ois_password_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ois_user -d ois']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ois-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Go Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ois-backend
    environment:
      ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ois_user
      DB_PASSWORD: ois_password_dev
      DB_NAME: ois
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev_secret_key_change_in_production
      PORT: 8000
    ports:
      - '8000:8000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: go run main.go

  # Angular Frontend (optional, usually runs separately)
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: ois-frontend
  #   ports:
  #     - '4200:4200'
  #   depends_on:
  #     - backend
  #   environment:
  #     API_URL: http://backend:8000

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: ois-network
